name: Kompilacja ESPHome
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Pobranie kodu
        uses: actions/checkout@v4
      
      - name: Instalacja ESPHome
        run: pip install esphome
        
      - name: Kompilacja pliku konfiguracyjnego
        run: esphome compile Pogoda.yaml
        
      - name: Udostepnienie pliku bin
        uses: actions/upload-artifact@v4
        with:
          name: plik-do-wgrania
          path: .esphome/build/ekran-pogodowy/.pioenvs/ekran-pogodowy/firmware.bin
          
