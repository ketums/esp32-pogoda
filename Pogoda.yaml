esphome:
  name: ekran-pogodowy
  friendly_name: Ekran Pogodowy

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

# Konfiguracja polaczenia Wi-Fi
wifi:
  ssid: "ESPtest"
  password: "12345678"
  
  # Automatyczny punkt dostepowy w razie awarii Wi-Fi
  ap:
    ssid: "Ekran-Pogodowy-Awaryjny"

# Aktywacja natywnego API dla Home Assistant
api:

# Logowanie zdarzen (przydatne do debugowania)
logger:

# Pobieranie stanu pogody bezpośrednio z Home Assistant
text_sensor:
  - platform: homeassistant
    id: stan_pogody
    entity_id: weather.home # <--- Tutaj wpisujesz nazwe encji pogodowej ze swojego Home Assistant
    
