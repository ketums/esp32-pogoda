esphome:
  name: ekran-pogodowy
  friendly_name: Ekran Pogodowy

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

# Konfiguracja Wi-Fi (uzupełnij swoje dane)
wifi:
  ssid: "ESPtest"
  password: "12345678"
  
  ap:
    ssid: "Ekran-Pogodowy-Awaryjny"

# Włączenie obsługi zapytań HTTP
http_request:
  useragent: esphome/device
  timeout: 10s

# Logowanie i serwer WWW
logger:
web_server:
  port: 80

# Czujnik tekstowy na temperaturę
text_sensor:
  - platform: template
    name: "Temperatura zewnętrzna"
    id: temp_zewnetrzna

# Skrypt pobierający dane co 15 minut i dekodujący JSON oficjalną metodą ESPHome
interval:
  - interval: 15min
    then:
      - http_request.get:
          url: "https://api.open-meteo.com/v1/forecast?latitude=54.5392&longitude=17.7501&current=temperature_2m"
          request_headers:
            Accept: "application/json"
          on_response:
            then:
              - json.parse:
                  json: !lambda 'return response->get_string();' # Ta uproszczona lambda jest wbudowana i akceptowana przez ESPHome
                  then:
                    - lambda: |-
                        if (root.containsKey("current")) {
                          auto current = root["current"];
                          if (current.containsKey("temperature_2m")) {
                            float temp = current["temperature_2m"];
                            id(temp_zewnetrzna).publish_state(str_snprintf("%.1f °C", 10, temp));
                          }
                        }
                        
