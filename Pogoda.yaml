esphome:
  name: ekran-pogodowy
  friendly_name: Ekran Pogodowy

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

# Konfiguracja Wi-Fi (uzupelnij swoje dane)
wifi:
  ssid: "ESPtest"
  password: "12345678"
  
  ap:
    ssid: "Ekran-Pogodowy-Awaryjny"

# Poprawiona sekcja HTTP (useragent pisany lacznie)
http_request:
  useragent: esphome/device
  timeout: 10s

# Logowanie i serwer WWW
logger:
web_server:
  port: 80

# Pobieranie temperatury z Open-Meteo i automatyczne wyciąganie jej z formatu JSON
sensor:
  - platform: http_request
    name: "Temperatura zewnętrzna"
    id: temp_zewnetrzna
    url: "https://api.open-meteo.com/v1/forecast?latitude=54.5392&longitude=17.7501&current=temperature_2m"
    update_interval: 15min
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    # Ten parametr automatycznie wchodzi w głąb struktury JSON i wyciąga wartość
    json_path: "$.current.temperature_2m"
    
