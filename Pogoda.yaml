esphome:
  name: ekran-pogodowy
  friendly_name: Ekran Pogodowy

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

# Konfiguracja Wi-Fi (wpisz swoje dane)
wifi:
  ssid: "ESPTest"
  password: "12345678"
  
  ap:
    ssid: "Ekran-Pogodowy-Awaryjny"

# Standardowe logowanie
logger:

# Serwer WWW - pozwoli Ci wejsc na IP płytki z telefonu i sprawdzić status
web_server:
  port: 80

# Czysty sensor tekstowy, który nie potrzebuje żadnych wtyczek internetowych
text_sensor:
  - platform: template
    name: "Status Urzadzenia"
    id: status_urzadzenia
    lambda: |-
      return {"Ekran działa standalone!"};
      
