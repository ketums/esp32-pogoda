esphome:
  name: ekran-pogodowy
  friendly_name: Ekran Pogodowy

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

# Konfiguracja Wi-Fi (uzupełnij swoje dane)
wifi:
  ssid: "ESPtest"
  password: "12345678"
  
  ap:
    ssid: "Ekran-Pogodowy-Awaryjny"

# Włączenie obsługi zapytań HTTP
http_request:
  useragent: esphome/device
  timeout: 10s

# Logowanie i serwer WWW
logger:
web_server:
  port: 80

# Definiujemy sensor tekstowy, który będzie przechowywał naszą temperaturę
text_sensor:
  - platform: template
    name: "Temperatura zewnętrzna"
    id: temp_zewnetrzna

# Skrypt uruchamiany co 15 minut pobierający dane i aktualizujący sensor
interval:
  - interval: 15min
    then:
      - http_request.get:
          url: "https://api.open-meteo.com/v1/forecast?latitude=54.5392&longitude=17.7501&current=temperature_2m"
          headers:
            Accept: "application/json"
          on_response:
            then:
              - lambda: |-
                  auto json = json::parse(response);
                  if (json.contains("current")) {
                    std::string temp = json["current"]["temperature_2m"].dump();
                    id(temp_zewnetrzna).publish_state(temp + " °C");
                  }
                  
