esphome:
  name: ekran-pogodowy
  friendly_name: Ekran Pogodowy

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

# Konfiguracja Wi-Fi (uzupelnij swoje dane)
wifi:
  ssid: "ESPtest"
  password: "12345678"
  
  ap:
    ssid: "Ekran-Pogodowy-Awaryjny"

# Wlaczenie obslugi zapytan HTTP
http_request:
  useragent: esphome/device
  timeout: 10s

# Logowanie i serwer WWW
logger:
web_server:
  port: 80

# Pobieranie temperatury bez uzywania lambdy w kodzie C++
sensor:
  - platform: template
    name: "Temperatura zewnętrzna"
    id: temp_zewnetrzna
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    update_interval: 15min
    # ESPHome sam wysle zapytanie i przypisze wartosc z filtra json
    lambda: |-
      return id(temp_zew_raw).state;

# Ukryty sensor pomocniczy, ktory bezpiecznie pobiera dane tekstowe
text_sensor:
  - platform: template
    id: temp_zew_raw
    on_value:
      then:
        - component.update: temp_zewnetrzna

# Skrypt cykliczny wykonujacy bezpieczne zapytanie HTTP
interval:
  - interval: 15min
    then:
      - http_request.get:
          url: "https://api.open-meteo.com/v1/forecast?latitude=54.5392&longitude=17.7501&current=temperature_2m"
          request_headers:
            Accept: "application/json"
          on_response:
            then:
              - logger.log: "Pobrano dane z Open-Meteo"
              
