esphome:
  name: waveshare-dashboard
  friendly_name: Waveshare Dashboard

  on_boot:
    priority: 600
    then:
      - logger.log: "Start panelu Waveshare Dashboard"

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf
    sdkconfig_options:
      # Wymuszenie obsługi pamięci Octal PSRAM dla płytki Waveshare ESP32-S3
      CONFIG_SPIRAM_MODE_OCT: "y"
      CONFIG_SPIRAM_TYPE_AUTO: "y"

logger:
  level: INFO
  baud_rate: 115200

api:
  encryption:
    key: "TU_WSTAW_KLUCZ_API"

ota:
  - platform: esphome
    password: "TU_WSTAW_HASLO_OTA"

wifi:
  # Automatyczne łączenie z Twoim hotspotem w telefonie
  ssid: "ESPTest"
  password: "12345678"

  # Awaryjny hotspot rozgłaszany przez płytkę, gdy nie ma zasięgu
  ap:
    ssid: "Waveshare Dashboard Hotspot"
    password: "12345678"

captive_portal:

web_server:
  port: 80

time:
  - platform: homeassistant
    id: ha_time

sensor:
  - platform: wifi_signal
    name: "Sila WiFi"
    update_interval: 60s

  - platform: uptime
    name: "Czas pracy panelu"

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "Adres IP panelu"

globals:
  - id: current_page
    type: int
    restore_value: no
    initial_value: '0'
