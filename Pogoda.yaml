esphome:
  name: ekran-pogodowy
  friendly_name: Ekran Pogodowy

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

# Konfiguracja Wi-Fi (uzupełnij swoje dane)
wifi:
  ssid: "ESPtest"
  password: "12345678"
  
  ap:
    ssid: "Ekran-Pogodowy-Awaryjny"

# Włączenie obsługi zapytań HTTP
http_request:
  useragent: esphome/device
  timeout: 10s

# Logowanie i serwer WWW
logger:
web_server:
  port: 80

# Tylko jeden czujnik tekstowy - brak problemów z konwersją na float!
text_sensor:
  - platform: template
    name: "Temperatura zewnętrzna"
    id: temp_zewnetrzna

# Skrypt pobierający dane z Open-Meteo co 15 minut
interval:
  - interval: 15min
    then:
      - http_request.get:
          url: "https://api.open-meteo.com/v1/forecast?latitude=54.5392&longitude=17.7501&current=temperature_2m"
          request_headers:
            Accept: "application/json"
          on_response:
            then:
              - lambda: |-
                  // Bezpieczne, tekstowe wycięcie temperatury bezpośrednio z tekstu odpowiedzi
                  std::string search_str = "\"temperature_2m\":";
                  size_t pos = response.find(search_str);
                  if (pos != std::string::npos) {
                    std::string val = response.substr(pos + search_str.length());
                    size_t end_pos = val.find_first_of(",}");
                    if (end_pos != std::string::npos) {
                      std::string temp = val.substr(0, end_pos);
                      id(temp_zewnetrzna).publish_state(temp + " °C");
                    }
                  }
                  
