esphome:
  name: ekran-pogodowy
  friendly_name: Ekran Pogodowy

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

# Konfiguracja polaczenia Wi-Fi
wifi:
  ssid: "TUTAJ_WPISZ_NAZWE_SWOJEGO_WIFI"
  password: "12345678"
  
  # Automatyczny punkt dostepowy w razie awarii Wi-Fi
  ap:
    ssid: "Ekran-Pogodowy-Awaryjny"

# Aktywacja natywnego API dla Home Assistant
api:

# Logowanie zdarzen (przydatne do debugowania)
logger:

# Komponent pobierajacy dane pogodowe z OpenWeatherMap
text_sensor:
  - platform: openweathermap
    id: pogoda_z_sieci
    api_key: "43f603e0b341be3dc59f463a6ea78716"
    latitude: 54.5392
    longitude: 17.7501
    update_interval: 30min

# Przykladowa sekcja wyswietlacza RGB dla Waveshare ESP32-S3
display:
  - platform: esp32_camera
